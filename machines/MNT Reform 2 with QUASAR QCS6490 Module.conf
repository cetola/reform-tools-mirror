# name of the system image file produced by reform-system-image
SYSIMAGE="reform-system-qcs6490"
DTBPATH="qcom/qcs6490-mnt-reform2.dtb"
EMMC_USE=true
EMMC_BOOT=warn
SD_BOOT=true
# name of devices in /dev
# there's no eMMC, but UFS. UFS looks like a bunch of scsi disks to linux
# (/dev/sdX). not all of these virtual disks (LUNs) may be freely used.
# FIXME: currently determining which one is safe/best to use.
DEV_MMC="sdX"
DEV_MMC_BOOT0=false
DEV_SD="mmcblk1"
DEV_SSD="nvme0n1"
DEV_USB="sda"
# the current u-boot hashes from source.mnt.re
BOOTLOADER_SHA1="FIXME"
BOOTLOADER_PROJECT="reform-qcs6490-uboot"
BOOTLOADER_TAG="FIXME"
BOOTLOADER_OFFSET=FIXME
FLASHBIN_OFFSET=0
NEED_NONFREE=false
BOOTARGS="ro no_console_suspend cryptomgr.notests console=ttyS2,1500000 cma=256M swiotlb=65535 plymouth.ignore-serial-consoles console=tty1"
