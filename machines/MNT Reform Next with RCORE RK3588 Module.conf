# name of the system image file produced by reform-system-image
SYSIMAGE="reform-next-system-rk3588"
DTBPATH="rockchip/rk3588-mnt-reform-next.dtb"
# flashing the reform-system-image to emmc also flashes u-boot which might
# soft-brick the module if something goes wrong
EMMC_USE=true
EMMC_BOOT=warn
SD_BOOT=true
# name of devices in /dev
DEV_MMC="mmcblk0"
DEV_MMC_BOOT0=false
DEV_SD="mmcblk1"
DEV_SSD="nvme0n1"
DEV_USB="sda"
# the current u-boot hashes from source.mnt.re
UBOOT_SHA1="60ab4d93e531d3234208a477f7d66c0a82e27b74"
UBOOT_PROJECT="reform-rk3588-uboot"
UBOOT_TAG="2025-11-04"
# idbloader.img is expected at an offset of 32768 bytes and u-boot follows 8355840 bytes after
UBOOT_OFFSET=32768
FLASHBIN_OFFSET=0
NEED_NONFREE=false
BOOTARGS="ro no_console_suspend cryptomgr.notests  clk_ignore_unused cma=256M swiotlb=65535  console=tty1"
