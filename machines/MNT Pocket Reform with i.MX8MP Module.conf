# name of the system image file produced by reform-system-image
SYSIMAGE="pocket-reform-system-imx8mp"
DTBPATH="freescale/imx8mp-mnt-pocket-reform.dtb"
EMMC_USE=true
EMMC_BOOT=warn
# prevent writing u-boot to sd-card because a) the imx8mplus will only read it
# from emmc anyways and b) because BOOTLOADER_OFFSET=0 would overwrite the MBR on it
SD_BOOT=false
# name of devices in /dev
DEV_MMC="mmcblk2"
DEV_MMC_BOOT0=true
DEV_SD="mmcblk0"
DEV_SSD="nvme0n1"
DEV_USB="sda"
# the current u-boot hashes from source.mnt.re
BOOTLOADER_SHA1="7c9b492961e71f2e46c41c9f0f8332c232b85763"
BOOTLOADER_PROJECT="reform-imx8mp-uboot"
BOOTLOADER_TAG="2026-01-28"
# when flashing to SD-card, the correct offset is 33792
# an offset of zero would overwrite the MBR
BOOTLOADER_OFFSET=0
FLASHBIN_OFFSET=0
NEED_NONFREE=false
BOOTARGS="ro no_console_suspend cryptomgr.notests pci=pcie_bus_perf nvme_core.default_ps_max_latency_us=0 console=tty1 fbcon=font:TER16x32 cma=256MB plymouth.ignore-serial-consoles console=ttymxc1"
