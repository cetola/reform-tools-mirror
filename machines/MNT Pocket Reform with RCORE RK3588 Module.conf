# name of the system image file produced by reform-system-image
SYSIMAGE="pocket-reform-system-rk3588"
DTBPATH="rockchip/rk3588-mnt-pocket-reform.dtb"
# flashing the reform-system-image to emmc also flashes u-boot which might
# soft-brick the module if something goes wrong
EMMC_USE=false
EMMC_BOOT=false
SD_BOOT=true
# name of devices in /dev
DEV_MMC="mmcblk0"
DEV_SD="mmcblk1"
DEV_SSD="nvme0n1"
DEV_USB="sda"
# the current u-boot hashes from source.mnt.re
UBOOT_SHA1="132cf840b6b1c7594f88c80f59c7de74265eb22f"
UBOOT_PROJECT="reform-rk3588-uboot"
UBOOT_TAG="2024-10-11b"
# idbloader.img is expected at an offset of 32768 bytes and u-boot follows 8355840 bytes after
UBOOT_OFFSET=32768
FLASHBIN_OFFSET=0
NEED_NONFREE=false
BOOTARGS="ro no_console_suspend cryptomgr.notests loglevel=3  clk_ignore_unused cma=256M swiotlb=65535 fbcon=rotate:3  console=tty1"
