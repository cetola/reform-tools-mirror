# name of the system image file produced by reform-system-image
SYSIMAGE="reform-system-rk3588"
DTBPATH="rockchip/rk3588-mnt-reform2.dtb"
# flashing the reform-system-image to emmc also flashes u-boot which might
# soft-brick the module if something goes wrong
EMMC_USE=true
EMMC_BOOT=warn
SD_BOOT=true
# name of devices in /dev
DEV_MMC="mmcblk0"
DEV_MMC_BOOT0=false
DEV_SD="mmcblk1"
DEV_SSD="nvme0n1"
DEV_USB="sda"
# the current u-boot hashes from source.mnt.re
BOOTLOADER_SHA1="f6c8b7373b0bfbb8b800a8f2860c01583a883ab0"
BOOTLOADER_PROJECT="reform-rk3588-uboot"
BOOTLOADER_TAG="2026-01-28"
# idbloader.img is expected at an offset of 32768 bytes and u-boot follows 8355840 bytes after
BOOTLOADER_OFFSET=32768
FLASHBIN_OFFSET=0
NEED_NONFREE=false
BOOTARGS="ro no_console_suspend cryptomgr.notests console=ttyS2,1500000 cma=256M swiotlb=65535 plymouth.ignore-serial-consoles pcie_aspm=off console=tty1"
