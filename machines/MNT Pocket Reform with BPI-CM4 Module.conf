# name of the system image file produced by reform-system-image
SYSIMAGE="pocket-reform-system-a311d"
DTBPATH="amlogic/meson-g12b-bananapi-cm4-mnt-pocket-reform.dtb"
# flashing the reform-system-image to emmc also flashes u-boot which might
# soft-brick the module if something goes wrong
EMMC_USE=warn
EMMC_BOOT=warn
SD_BOOT=true
# name of devices in /dev
DEV_MMC="mmcblk1"
DEV_MMC_BOOT0=true
DEV_SD="mmcblk0"
DEV_SSD="nvme0n1"
DEV_USB="sda"
# the current u-boot hashes from source.mnt.re
UBOOT_SHA1="1f26e468517bcc9623c2f2191a212c7a3c5cd930"
UBOOT_PROJECT="reform-a311d-uboot"
UBOOT_TAG="2026-01-11"
UBOOT_OFFSET=512
FLASHBIN_OFFSET=512
# non-free-firmware is required for firmware-realtek
NEED_NONFREE=true
BOOTARGS="ro no_console_suspend cryptomgr.notests console=ttyAML0,115200 pci=pcie_bus_perf libata.force=noncq nvme_core.default_ps_max_latency_us=0 plymouth.ignore-serial-consoles console=tty1 fbcon=rotate:3"
