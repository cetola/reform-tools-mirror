# Using u-boot-menu requires a recent version of u-boot for your platform
# so that device specific ${bootargs} are set.
# To overwrite the contents of this file, use /etc/default/u-boot and fill
# it with the board-specific parameters:
#
# imx8mq:
# U_BOOT_PARAMETERS="ro no_console_suspend console=ttymxc0,115200 cma=512M pci=nomsi console=ttymxc0,115200 console=tty1"
# a311d:
# U_BOOT_PARAMETERS="ro no_console_suspend console=ttyAML0,115200 pci=pcie_bus_perf libata.force=noncq nvme_core.default_ps_max_latency_us=0 console=tty1"
# ls1028a:
# U_BOOT_PARAMETERS="ro no_console_suspend console=ttyS0,115200 cma=512M@3G iommu.passthrough=1 arm-smmu.disable_bypass=0 console=tty1"
#
U_BOOT_ROOT=" "
U_BOOT_PARAMETERS="ro no_console_suspend cryptomgr.notests loglevel=3 \${bootargs} console=tty1"
